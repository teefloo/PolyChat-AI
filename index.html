    <!-- Reads polychat-settings before paint to avoid theme flicker    -->
    <!-- ============================================================ -->
    <script>
      try {
        const stored = JSON.parse(localStorage.getItem('polychat-settings') || '{}');
        const theme = stored?.state?.theme || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        const legal = JSON.parse(localStorage.getItem('polychat-legal') || '{}');
        const fontsConsent = legal?.state?.fontsConsent === true;
        document.documentElement.setAttribute('data-fonts', fontsConsent ? 'web' : 'system');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.setAttribute('data-fonts', 'system');
      }
    </script>
