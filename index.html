    <!-- Reads polychat-settings before paint to avoid theme flicker    -->
    <!-- ============================================================ -->
    <script>
      try {
        const stored = JSON.parse(localStorage.getItem('polychat-settings') || '{}');
        const theme = stored?.state?.theme || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        const legal = JSON.parse(localStorage.getItem('polychat-legal') || '{}');
        const fontsConsent = legal?.state?.fontsConsent === true;
        document.documentElement.setAttribute('data-fonts', fontsConsent ? 'web' : 'system');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.setAttribute('data-fonts', 'system');
      }
    </script>

        <main class="polychat-fallback">
          <h1>PolyChat AI — Chat avec 100+ modèles d'IA</h1>
          <p>
            <strong>PolyChat AI</strong> est une interface web open source qui rassemble
            <strong>plus de 100 modèles d'intelligence artificielle</strong> — GPT-4, Claude 3.5,
            Gemini 1.5, Llama 3, Mistral — dans une seule application, via l'API
            <a href="https://openrouter.ai">OpenRouter</a>. Comparez jusqu'à
            <strong>3 modèles en parallèle</strong> sur la même question, en streaming temps réel.
          </p>
          <p>
            L'interface de chat nécessite JavaScript. La FAQ ci-dessous reste consultable et
            entièrement fonctionnelle sans JavaScript. Vous pouvez aussi consulter le code source
            sur <a href="https://github.com/Teeflo/PolyChat-AI">GitHub</a>.
          </p>

          <h2>Fonctionnalités principales</h2>
          <ul>
            <li>Accès à 100+ modèles d'IA (OpenAI, Anthropic, Google, Meta, Mistral, DeepSeek)</li>
            <li>Comparaison de 3 modèles en parallèle dans une seule session</li>
            <li>Streaming des réponses en temps réel</li>
            <li>4 thèmes visuels : sombre, clair, pixel art, hacker</li>
            <li>Historique 100 % local (localStorage), aucun serveur tiers</li>
            <li>Open source, licence MIT, gratuit</li>
          </ul>

          <h2>Questions fréquentes (FAQ — 30 réponses)</h2>

          <h3>Premiers pas</h3>
          <details><summary>Qu'est-ce que PolyChat AI ?</summary><p>Une interface web open source qui donne accès à plus de 100 modèles d'intelligence artificielle — GPT-4o, Claude 3.5, Gemini 1.5, Llama 3, Mistral — depuis une seule application. L'application, construite avec React 19 et TypeScript, communique avec les modèles via l'API OpenRouter et stocke vos conversations localement dans votre navigateur. Le code est publié sous licence MIT sur GitHub.</p></details>
          <details><summary>Comment démarrer avec PolyChat AI ?</summary><p>Trois étapes suffisent : (1) créez un compte gratuit sur openrouter.ai et générez une clé d'API ; (2) ouvrez polychat-ai.vercel.app et collez votre clé dans la fenêtre Paramètres (icône engrenage, en haut à droite) ; (3) choisissez un modèle dans la liste déroulante et envoyez votre premier message. Aucune installation n'est requise : tout fonctionne dans le navigateur.</p></details>
          <details><summary>Faut-il créer un compte sur PolyChat AI ?</summary><p>Non. PolyChat AI ne propose ni inscription, ni compte utilisateur, ni adresse e-mail. La seule donnée d'identification dont vous avez besoin est une clé d'API OpenRouter, que vous collez directement dans les paramètres. L'application reste anonyme et ne collecte rien sur ses utilisateurs ; rien n'est télémétré.</p></details>
          <details><summary>Comment obtenir une clé d'API OpenRouter ?</summary><p>Rendez-vous sur openrouter.ai, créez un compte (e-mail ou OAuth Google/Discord/GitHub), puis ouvrez la page Keys de votre espace personnel. Cliquez sur Create Key, donnez-lui un nom, copiez la valeur (elle commence par <code>sk-or-</code>) et collez-la dans les Paramètres de PolyChat AI. Ajoutez ensuite un crédit (≥ 5 $) pour activer les modèles payants ; certains modèles open source restent gratuits.</p></details>
          <details><summary>Sur quels appareils et navigateurs fonctionne PolyChat AI ?</summary><p>Chrome 119+, Firefox 122+, Safari 17.4+, Edge 119+. L'interface est responsive (desktop, tablette, mobile) et s'adapte à toutes les tailles d'écran. Aucune application native n'est distribuée, mais l'application peut être installée comme PWA via le menu du navigateur (« Installer l'application »).</p></details>

          <h3>Fonctionnalités</h3>
          <details><summary>Comment comparer plusieurs modèles en parallèle ?</summary><p>Dans la barre d'outils d'une conversation, cliquez sur le sélecteur de colonnes (1, 2 ou 3) pour afficher jusqu'à 3 fenêtres simultanément. Chaque fenêtre possède son propre menu déroulant de modèle. Tant qu'aucun message n'a été envoyé, votre saisie est diffusée en parallèle aux trois colonnes, et leurs réponses apparaissent en streaming côte à côte.</p></details>
          <details><summary>Puis-je reprendre une conversation plus tard ?</summary><p>Oui. Toutes vos conversations sont sauvegardées automatiquement dans le localStorage de votre navigateur après chaque message. Vous les retrouvez dans la barre latérale gauche, regroupées par date (Aujourd'hui, Hier, date explicite). Cliquez sur un titre pour reprendre exactement là où vous vous étiez arrêté(e), avec l'historique complet des échanges et le modèle utilisé.</p></details>
          <details><summary>Comment renommer ou supprimer une conversation ?</summary><p>Survolez une conversation dans la barre latérale : une icône crayon (renommer) et une icône corbeille (supprimer) apparaissent à droite. Le titre d'origine est généré automatiquement à partir des 60 premiers caractères du premier message utilisateur. La suppression retire définitivement la conversation après confirmation. Ces actions sont locales et immédiates.</p></details>
          <details><summary>Le streaming des réponses est-il pris en charge ?</summary><p>Oui. PolyChat AI utilise le streaming Server-Sent Events (SSE) d'OpenRouter. Les tokens apparaissent mot par mot au fur et à mesure que le modèle les génère, avec un curseur clignotant. Vous pouvez interrompre la génération à tout moment avec le bouton Stop (carré) de la colonne. Une fois interrompue, la réponse partielle est conservée et le bouton Régénérer devient disponible.</p></details>
          <details><summary>Comment fonctionne la recherche dans la barre latérale ?</summary><p>Le champ de recherche en haut de la barre latérale filtre vos conversations en temps réel. La recherche porte sur le titre de la conversation, pas sur le contenu des messages (le contenu reste dans votre navigateur, jamais indexé côté serveur). Effacez le champ pour revenir à la liste complète, toujours regroupée par date.</p></details>

          <h3>Modèles &amp; réglage</h3>
          <details><summary>Quels modèles d'IA sont disponibles ?</summary><p>Plus de 100 modèles à jour via OpenRouter, incluant OpenAI (GPT-4o, GPT-4 Turbo, o1, o3-mini), Anthropic (Claude 3.5 Sonnet, Claude 3 Opus, Claude 3 Haiku), Google (Gemini 1.5 Pro, Gemini 1.5 Flash, Gemma 2), Meta (Llama 3.1 405B, Llama 3.3 70B), Mistral (Large, Codestral), DeepSeek (V3, R1), Qwen, Cohere et de nombreux modèles open source.</p></details>
          <details><summary>Comment changer de modèle en cours de conversation ?</summary><p>Cliquez sur le sélecteur de modèle en haut d'une colonne pour basculer vers un autre modèle. Le changement s'applique aux messages suivants ; les échanges précédents restent visibles mais ont été générés par l'ancien modèle. Pour repartir d'une page blanche avec un nouveau modèle, créez une nouvelle conversation via le bouton « Nouvelle conversation ».</p></details>
          <details><summary>Que signifient température et jetons maximum ?</summary><p>La température (entre 0 et 2) contrôle le degré de créativité du modèle : 0 produit des réponses déterministes et focalisées, 1 un équilibre, 2 des réponses plus variées et créatives. Le nombre maximal de jetons (max_tokens) plafonne la longueur de la réponse (par ex. 1024 ≈ 750 mots en français). Les deux réglages se trouvent dans la fenêtre Paramètres.</p></details>
          <details><summary>Qu'est-ce que le prompt système ?</summary><p>Le prompt système est une instruction envoyée au modèle avant chaque échange, mais invisible dans la conversation affichée. Il sert à définir le ton, le rôle ou les contraintes (par ex. « Tu es un expert en cuisine française. Réponds de manière concise, sans notes de bas de page »). Vous le définissez une seule fois dans les Paramètres ; il s'applique à toutes les nouvelles conversations et à toutes les colonnes.</p></details>

          <h3>Confidentialité &amp; RGPD</h3>
          <details><summary>Mes conversations sont-elles privées ?</summary><p>Oui. L'historique de vos conversations est stocké exclusivement dans le localStorage de votre navigateur. Aucun serveur PolyChat AI ne reçoit ni ne lit vos messages. En revanche, vos messages transitent par OpenRouter (hébergé aux États-Unis) puis par le fournisseur du modèle choisi selon leurs propres politiques de confidentialité.</p></details>
          <details><summary>Ma clé d'API est-elle sécurisée ?</summary><p>Votre clé d'API OpenRouter est stockée localement dans votre navigateur. Elle est obfusquée (XOR + base64) avant écriture pour limiter le risque d'extraction triviale via la console. Important : cette obfuscation n'est pas un chiffrement fort. Pour une sécurité maximale, utilisez une clé à crédits limités et révoquez-la sur openrouter.ai après usage intensif.</p></details>
          <details><summary>Pourquoi ce bandeau de consentement au premier chargement ?</summary><p>PolyChat AI applique le RGPD et les recommandations CNIL. Avant la première utilisation, vous devez accepter explicitement les documents juridiques (mentions légales, politique de confidentialité, CGU, politique cookies, avertissement IA). La version acceptée est enregistrée avec un horodatage. Vous pouvez retirer votre consentement à tout moment depuis la fenêtre Confidentialité.</p></details>
          <details><summary>Les Google Fonts sont-ils obligatoires ?</summary><p>Non. Par défaut, l'application utilise les polices système de votre appareil (sérif, sans-serif, monospace natives), ce qui n'entraîne aucune requête réseau supplémentaire. Si vous activez Google Fonts dans Confidentialité → Polices, les fontes Fraunces, IBM Plex Sans et JetBrains Mono sont chargées depuis Google LLC, ce qui implique une requête externe et la transmission de votre adresse IP.</p></details>

          <h3>Données &amp; export</h3>
          <details><summary>Où sont stockées mes conversations ?</summary><p>Toutes vos conversations, vos paramètres, votre clé d'API et vos consentements sont stockés dans le localStorage de votre navigateur, sous trois clés distinctes : <code>polychat-settings</code>, <code>polychat_history</code> et <code>polychat-legal</code>. Aucune base de données serveur, aucun cookie tiers, aucun service d'analytics. Videz le localStorage ou utilisez le mode navigation privée pour repartir d'un état vierge.</p></details>
          <details><summary>Puis-je exporter mes données ?</summary><p>Oui. Ouvrez la fenêtre Confidentialité (bouton « Confidentialité » du pied de page), puis cliquez sur « Exporter mes données ». Un fichier <code>polychat-export-AAAA-MM-JJ.json</code> est téléchargé. Il contient l'intégralité de vos conversations, vos paramètres, vos consentements et leurs horodatages. Vous pouvez l'archiver, le migrer vers un autre outil ou l'utiliser comme sauvegarde.</p></details>
          <details><summary>Comment supprimer définitivement mes données ?</summary><p>Deux options. (1) Ciblée : dans la barre latérale, survolez une conversation et cliquez sur la corbeille. (2) Globale : dans Confidentialité → « Supprimer toutes mes données », confirmez. Toutes les clés localStorage sont effacées, la page se recharge et vous repartez d'un état vierge. Les consentements juridiques seront redemandés au prochain chargement. Action irréversible.</p></details>
          <details><summary>Que se passe-t-il si je vide le cache du navigateur ?</summary><p>Vider le cache du navigateur (images, fichiers mis en cache) n'efface pas le localStorage. En revanche, vider les « données de site » ou utiliser les options « Cookies et données de site » efface le localStorage, donc vos conversations, vos paramètres et vos consentements. Pensez à exporter vos données au préalable si vous souhaitez les conserver.</p></details>

          <h3>Comparaison</h3>
          <details><summary>Quelle est la différence avec ChatGPT ?</summary><p>ChatGPT est un service propriétaire d'OpenAI qui ne donne accès qu'aux modèles OpenAI, dans une interface unique et un abonnement mensuel (ChatGPT Plus à 23 $/mois). PolyChat AI est une interface libre (MIT) qui agrège plus de 100 modèles de tous les fournisseurs en paiement à l'usage réel via OpenRouter, avec comparaison multi-modèles en parallèle sur une même question.</p></details>
          <details><summary>Pourquoi passer par OpenRouter ?</summary><p>OpenRouter est une passerelle unifiée qui facture à l'usage réel, sans abonnement, et unifie l'API : un seul format d'appel, une seule facturation, un seul tableau de bord pour 100+ fournisseurs. Vous gérez vos crédits et vos clés au même endroit, vous payez uniquement ce que vous consommez, et vous pouvez basculer d'un modèle à l'autre sans changer d'interface.</p></details>
          <details><summary>Et face à claude.ai ou gemini.google.com ?</summary><p>Les interfaces officielles (claude.ai, gemini.google.com, chat.openai.com) ne donnent accès qu'à un seul fournisseur à la fois et conservent vos conversations sur leurs serveurs. PolyChat AI mutualise tous ces fournisseurs derrière une seule URL, garde l'historique en local et permet la comparaison côte à côte. L'inconvénient : vous payez à l'usage réel au lieu d'un forfait, et devez gérer votre clé d'API.</p></details>
          <details><summary>Pourquoi ma requête échoue-t-elle ?</summary><p>Les causes les plus fréquentes : (1) clé d'API absente, expirée ou invalide — vérifiez dans Paramètres ; (2) crédit OpenRouter épuisé — rechargez sur openrouter.ai ; (3) modèle momentanément indisponible ou rate-limit atteint — réessayez ou changez de modèle ; (4) bloqueur publicitaire ou VPN trop restrictif — désactivez-le pour openrouter.ai.</p></details>

          <h3>Technique</h3>
          <details><summary>Quelles technologies sont utilisées ?</summary><p>React 19, TypeScript strict, Vite 7, Zustand (avec persistance localStorage), react-markdown + remark-gfm pour le rendu Markdown, lucide-react pour les icônes, et un CSS écrit à la main avec variables de thème. Aucune dépendance Tailwind ni framework UI externe. Le bundle final est inférieur à 200 Ko gzippé et la première peinture est inférieure à 100 ms sur connexion 4G.</p></details>
          <details><summary>Puis-je installer PolyChat AI comme une application ?</summary><p>Oui, comme PWA. Sur Chrome ou Edge, cliquez sur l'icône « installer » à droite de la barre d'adresse. Sur Safari macOS, choisissez Fichier → Ajouter au Dock. Sur iOS/Android, « Ajouter à l'écran d'accueil » depuis le menu du navigateur. L'application se lance alors en mode standalone, sans barre d'adresse, avec un manifeste et une icône dédiés.</p></details>

          <h3>Communauté</h3>
          <details><summary>Comment signaler un bug ou proposer une fonctionnalité ?</summary><p>Ouvrez un ticket sur le dépôt GitHub <a href="https://github.com/Teeflo/PolyChat-AI">github.com/Teeflo/PolyChat-AI</a> dans la section Issues. Pour un bug, décrivez les étapes de reproduction, le navigateur, le modèle utilisé et joignez si possible une capture d'écran. Pour une fonctionnalité, expliquez le besoin, l'API envisagée et le bénéfice utilisateur.</p></details>
          <details><summary>Puis-je contribuer au projet ?</summary><p>Oui, c'est un projet open source. Vous pouvez contribuer de plusieurs manières : signaler un bug, proposer une fonctionnalité, améliorer la documentation, traduire l'interface (français ↔ anglais), soumettre une pull request. Toute contribution est créditée dans le fichier CONTRIBUTORS.md et le CHANGELOG du projet.</p></details>
          <details><summary>Sous quelle licence le code est-il publié ?</summary><p>PolyChat AI est publié sous licence MIT. Vous êtes libre de l'utiliser, le copier, le modifier, le fusionner, le publier, le distribuer, le sous-licencier et/ou le vendre, à condition de conserver la notice de copyright et la licence dans toutes les copies.</p></details>
          <details><summary>Comment suivre les évolutions du produit ?</summary><p>Les versions publiées sont listées sur la page Releases de GitHub (numérotation SemVer). Le CHANGELOG.md détaille les changements notables. Pour les questions juridiques, la version courante est affichée en bas de chaque document légal. Lorsqu'un changement substantiel modifie vos droits, la constante <code>CURRENT_LEGAL_VERSION</code> est bumpée et le bandeau de consentement réapparaît.</p></details>
