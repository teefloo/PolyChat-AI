<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="grad-c3a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-c3b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-c3c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Three overlapping speech bubbles -->
  <g id="icon-c3" transform="translate(10, 8)">
    <!-- Back bubble (blue) -->
    <rect x="0" y="8" width="35" height="28" rx="6" fill="url(#grad-c3c)" opacity="0.85" />
    <polygon points="5,36 12,44 18,36" fill="url(#grad-c3c)" opacity="0.85" />
    
    <!-- Middle bubble (purple) -->
    <rect x="14" y="16" width="35" height="28" rx="6" fill="url(#grad-c3b)" opacity="0.9" />
    <polygon points="19,44 26,52 32,44" fill="url(#grad-c3b)" opacity="0.9" />
    
    <!-- Front bubble (pink/orange) -->
    <rect x="28" y="4" width="35" height="28" rx="6" fill="url(#grad-c3a)" />
    <polygon points="33,32 40,40 46,32" fill="url(#grad-c3a)" />
    
    <!-- Dots inside front bubble -->
    <circle cx="38" cy="15" r="2" fill="#FFFFFF" />
    <circle cx="45" cy="15" r="2" fill="#FFFFFF" />
    <circle cx="52" cy="15" r="2" fill="#FFFFFF" />
  </g>
  
  <!-- Text: PolyChat -->
  <text x="85" y="45" 
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="36" 
        font-weight="700" 
        fill="#1F2937"
        letter-spacing="-0.5">
    PolyChat
  </text>
  
  <!-- AI badge -->
  <rect x="85" y="52" width="28" height="18" rx="4" fill="#EC4899" />
  <text x="99" y="65" 
        font-family="'Inter', system-ui, sans-serif" 
        font-size="11" 
        font-weight="700" 
        fill="#FFFFFF"
        text-anchor="middle">
    AI
  </text>
</svg>