<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="grad-c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Hexagonal network representing multiple AI models -->
  <g id="icon-c2" transform="translate(10, 8)">
    <!-- Hexagon background -->
    <polygon points="30,2 55,15 55,43 30,56 5,43 5,15" 
             fill="none" 
             stroke="url(#grad-c2)" 
             stroke-width="2.5" />
    
    <!-- Inner hexagon -->
    <polygon points="30,12 45,20 45,38 30,46 15,38 15,20" 
             fill="url(#grad-c2)" 
             opacity="0.15" />
    
    <!-- Center AI symbol -->
    <text x="30" y="35" 
          font-family="'Inter', system-ui, sans-serif" 
          font-size="16" 
          font-weight="700" 
          fill="#3B82F6"
          text-anchor="middle">
      AI
    </text>
    
    <!-- Connection nodes at hexagon vertices -->
    <circle cx="30" cy="2" r="3" fill="#06B6D4" />
    <circle cx="55" cy="15" r="3" fill="#3B82F6" />
    <circle cx="55" cy="43" r="3" fill="#6366F1" />
    <circle cx="30" cy="56" r="3" fill="#8B5CF6" />
    <circle cx="5" cy="43" r="3" fill="#A855F7" />
    <circle cx="5" cy="15" r="3" fill="#06B6D4" />
  </g>
  
  <!-- Text: PolyChat -->
  <text x="85" y="45" 
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="36" 
        font-weight="700" 
        fill="#1F2937"
        letter-spacing="-0.5">
    PolyChat
  </text>
  
  <!-- Tagline -->
  <text x="87" y="65" 
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="11" 
        font-weight="400" 
        fill="#6B7280"
        letter-spacing="0.5">
    Multi-Model AI Chat
  </text>
</svg>