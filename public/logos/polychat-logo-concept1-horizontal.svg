<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Multiple chat bubbles forming a neural network -->
  <g id="icon" transform="translate(10, 10)">
    <!-- Main bubble -->
    <path d="M30,5 Q45,5 45,20 L45,35 Q45,50 30,50 L15,50 L5,58 L8,50 Q0,50 0,35 L0,20 Q0,5 15,5 Z" 
          fill="url(#grad1)" />
    <!-- Secondary bubble (top right) -->
    <path d="M52,0 Q62,0 62,10 L62,20 Q62,30 52,30 L48,30 L45,34 L46,30 Q40,30 40,20 L40,10 Q40,0 50,0 Z" 
          fill="url(#grad2)" opacity="0.9" />
    <!-- Small bubble (bottom right) -->
    <circle cx="58" cy="42" r="8" fill="#A855F7" opacity="0.8" />
    <!-- Neural connection dots -->
    <circle cx="22" cy="28" r="2.5" fill="#FFFFFF" />
    <circle cx="52" cy="15" r="2" fill="#FFFFFF" />
    <circle cx="58" cy="42" r="1.5" fill="#FFFFFF" />
    <!-- Connection lines -->
    <line x1="24" y1="28" x2="50" y2="15" stroke="#FFFFFF" stroke-width="1" opacity="0.6" />
    <line x1="24" y1="28" x2="56" y2="42" stroke="#FFFFFF" stroke-width="1" opacity="0.6" />
    <line x1="52" y1="17" x2="56" y2="40" stroke="#FFFFFF" stroke-width="1" opacity="0.6" />
  </g>
  
  <!-- Text: PolyChat -->
  <text x="85" y="48" 
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="36" 
        font-weight="700" 
        fill="#1F2937"
        letter-spacing="-0.5">
    PolyChat
  </text>
  
  <!-- AI suffix -->
  <text x="85" y="68" 
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="14" 
        font-weight="500" 
        fill="#6366F1"
        letter-spacing="3">
    AI
  </text>
</svg>